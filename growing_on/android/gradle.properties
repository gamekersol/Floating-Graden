android.useAndroidX=true
# Enables the Gradle Daemon for faster subsequent builds (usually enabled by default in newer versions)
org.gradle.daemon=true

# Enables caching of task outputs to reuse results from previous builds
org.gradle.caching=true

# Allows Gradle to run tasks in parallel. Best for multi-module projects.
org.gradle.parallel=true

# Configures the Java Virtual Machine (JVM) arguments for the Gradle Daemon
